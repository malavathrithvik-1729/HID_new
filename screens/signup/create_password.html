<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>V-Med ID | Create Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0a1628;--paper:#f8f6f1;--accent:#1a6b4a;--muted:#6b7a8d;--err:#dc2626}
body{font-family:'Outfit',sans-serif;background:var(--paper);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.wrapper{width:100%;max-width:440px}
h1{font-family:'Playfair Display',serif;font-size:32px;color:var(--ink);margin-bottom:8px}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:32px;font-weight:300}
.card{background:#fff;border-radius:20px;border:1px solid rgba(10,22,40,0.07);padding:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:7px}
.form-group input{width:100%;padding:13px 16px;border:1.5px solid rgba(10,22,40,0.12);border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border .2s}
.form-group input:focus{border-color:var(--accent)}
.strength-bar{height:3px;border-radius:2px;background:rgba(10,22,40,0.08);margin-top:8px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.strength-text{font-size:11px;color:var(--muted);margin-top:4px}
.err-msg{background:rgba(220,38,38,0.08);color:var(--err);border:1px solid rgba(220,38,38,0.15);border-radius:10px;padding:12px;font-size:13px;margin-bottom:16px;display:none}
.err-msg.show{display:block}
.btn-submit{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-submit:hover{background:#155a3d}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
</style>
</head>
<body>
<div class="wrapper">
  <h1>Create your password</h1>
  <p class="subtitle">Set a strong password to secure your V-Med ID account.</p>
  <div class="card">
    <div class="err-msg" id="errMsg"></div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" oninput="checkStrength(this.value)"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-text" id="strengthText">Enter a password</div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password"/>
    </div>
    <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Complete Registration →</button>
  </div>
</div>

<script type="module">
import { signupUser } from "../../js/auth.js";
import { savePatientApplication, saveDoctorApplication } from "../../js/app.js";

window.checkStrength = function(v) {
  const fill = document.getElementById("strengthFill");
  const text = document.getElementById("strengthText");
  let score = 0;
  if(v.length>=8) score++;
  if(/[A-Z]/.test(v)) score++;
  if(/[0-9]/.test(v)) score++;
  if(/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ["#ef4444","#f97316","#eab308","#22c55e"];
  const labels = ["Weak","Fair","Good","Strong"];
  fill.style.width = (score*25)+"%";
  fill.style.background = colors[score-1]||"#e5e7eb";
  text.textContent = score ? labels[score-1] : "Enter a password";
};

window.handleSubmit = async function() {
  const pw = document.getElementById("password").value;
  const cpw = document.getElementById("confirmPassword").value;
  const err = document.getElementById("errMsg");
  const btn = document.getElementById("submitBtn");
  err.classList.remove("show");
  if(pw.length < 8){err.textContent="Password must be at least 8 characters.";err.classList.add("show");return;}
  if(pw !== cpw){err.textContent="Passwords do not match.";err.classList.add("show");return;}
  const role = sessionStorage.getItem("signupRole");
  const email = sessionStorage.getItem("email");
  const rawData = JSON.parse(sessionStorage.getItem("applicationData")||"{}");
  if(!email||!rawData.fullName){err.textContent="Session expired. Please start again.";err.classList.add("show");return;}
  btn.disabled = true; btn.textContent = "Creating your account...";
  try {
    const user = await signupUser(email, pw);
    if(role === "patient") await savePatientApplication(user, rawData);
    else await saveDoctorApplication(user, rawData);
    sessionStorage.clear();
    window.location.href = "signup_success.html";
  } catch(e) {
    err.textContent = e.message; err.classList.add("show");
    btn.disabled = false; btn.textContent = "Complete Registration →";
  }
};
</script>
</body>
</html>
