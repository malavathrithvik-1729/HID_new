<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>V-Med ID | Patient Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0a1628;--paper:#f8f6f1;--accent:#1a6b4a;--muted:#6b7a8d;--err:#dc2626}
body{font-family:'Outfit',sans-serif;background:var(--paper);min-height:100vh;padding:40px 24px}
.wrapper{max-width:680px;margin:0 auto}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--muted);text-decoration:none;margin-bottom:32px;transition:color .2s}
.back-link:hover{color:var(--accent)}
.page-header{margin-bottom:36px}
.step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.step{width:28px;height:4px;border-radius:2px;background:rgba(10,22,40,0.1);transition:.3s}
.step.active{background:var(--accent);width:40px}
.step.done{background:var(--accent)}
h1{font-family:'Playfair Display',serif;font-size:32px;color:var(--ink);margin-bottom:6px}
.subtitle{font-size:14px;color:var(--muted);font-weight:300}
.card{background:#fff;border-radius:20px;border:1px solid rgba(10,22,40,0.07);padding:32px;margin-bottom:20px}
.card h2{font-size:14px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(10,22,40,0.06)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:6px}
.req{color:var(--err);margin-left:2px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid rgba(10,22,40,0.12);border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:80px}
.form-group .hint{font-size:11px;color:var(--muted);margin-top:5px}
.err-msg{background:rgba(220,38,38,0.08);color:var(--err);border:1px solid rgba(220,38,38,0.15);border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:16px;display:none}
.err-msg.show{display:block}
.btn-submit{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-submit:hover{background:#155a3d}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrapper">
  <a class="back-link" href="signup.html">← Back</a>
  <div class="page-header">
    <div class="step-indicator"><div class="step active"></div><div class="step"></div><div class="step"></div></div>
    <h1>Patient Registration</h1>
    <p class="subtitle">Fill in your details to create your V-Med ID. Fields marked <span style="color:var(--err)">*</span> are required.</p>
  </div>
  <div class="err-msg" id="errMsg"></div>

  <!-- Identity -->
  <div class="card">
    <h2>Personal Identity</h2>
    <div class="grid-2">
      <div class="form-group"><label>Full Name <span class="req">*</span></label><input type="text" id="fullName" placeholder="As per Aadhaar"/></div>
      <div class="form-group"><label>Father's Name <span class="req">*</span></label><input type="text" id="fatherName" placeholder="Father's full name"/></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Gender <span class="req">*</span></label><select id="gender"><option value="">— Select —</option><option>Male</option><option>Female</option><option>Other</option></select></div>
      <div class="form-group"><label>Date of Birth <span class="req">*</span></label><input type="date" id="dob"/></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Blood Group</label><select id="bloodGroup"><option value="">— Select —</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div>
      <div class="form-group"><label>Occupation</label><input type="text" id="occupation" placeholder="e.g. Teacher, Engineer"/></div>
    </div>
  </div>

  <!-- Government IDs -->
  <div class="card">
    <h2>Government IDs</h2>
    <div class="grid-2">
      <div class="form-group"><label>Aadhaar Number <span class="req">*</span></label><input type="text" id="aadhaar" placeholder="12-digit number" maxlength="12"/></div>
      <div class="form-group"><label>ABHA Number <span class="req">*</span></label><input type="text" id="abha" placeholder="ABHA Health ID"/></div>
    </div>
    <div class="form-group"><label>Address <span class="req">*</span></label><textarea id="address" placeholder="Full address including city, state, PIN code"></textarea></div>
  </div>

  <!-- Contact -->
  <div class="card">
    <h2>Contact Details</h2>
    <div class="grid-2">
      <div class="form-group"><label>Email <span class="req">*</span></label><input type="email" id="email" placeholder="your@email.com"/></div>
      <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" placeholder="+91 XXXXX XXXXX"/></div>
    </div>
  </div>

  <!-- Documents -->
  <div class="card">
    <h2>Medical Documents (Google Drive Links)</h2>
    <div class="form-group"><label>Blood Report URL <span class="req">*</span></label><input type="url" id="docBlood" placeholder="https://drive.google.com/file/d/..."/><div class="hint">Share the file publicly or with anyone with link</div></div>
    <div class="form-group"><label>Allergy Report URL</label><input type="url" id="docAllergy" placeholder="https://drive.google.com/file/d/... (optional)"/></div>
    <div class="form-group"><label>Surgery Report URL</label><input type="url" id="docSurgery" placeholder="https://drive.google.com/file/d/... (optional)"/></div>
    <div class="form-group"><label>Medication List URL</label><input type="url" id="docMeds" placeholder="https://drive.google.com/file/d/... (optional)"/></div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Continue to Create Password →</button>
</div>

<script type="module">
window.handleSubmit = function() {
  const get = id => document.getElementById(id).value.trim();
  const err = document.getElementById("errMsg");
  const btn = document.getElementById("submitBtn");
  err.classList.remove("show");

  const required = [
    [get("fullName"), "Full name is required"],
    [get("fatherName"), "Father's name is required"],
    [get("gender"), "Please select gender"],
    [get("dob"), "Date of birth is required"],
    [get("aadhaar"), "Aadhaar number is required"],
    [get("abha"), "ABHA number is required"],
    [get("address"), "Address is required"],
    [get("email"), "Email is required"],
    [get("docBlood"), "Blood report URL is required"],
  ];
  for (const [val, msg] of required) {
    if (!val) { err.textContent = msg; err.classList.add("show"); return; }
  }
  if (get("aadhaar").length !== 12) { err.textContent = "Aadhaar must be 12 digits."; err.classList.add("show"); return; }

  const docs = [
    {type:"report",title:"Blood Test",externalUrl:get("docBlood")},
  ];
  const allergy = get("docAllergy"); if(allergy) docs.push({type:"report",title:"Allergy Report",externalUrl:allergy});
  const surgery = get("docSurgery"); if(surgery) docs.push({type:"report",title:"Surgery Report",externalUrl:surgery});
  const meds = get("docMeds"); if(meds) docs.push({type:"report",title:"Medication List",externalUrl:meds});

  const data = {
    fullName: get("fullName"), fatherName: get("fatherName"),
    gender: get("gender"), dob: get("dob"),
    bloodGroup: get("bloodGroup"), occupation: get("occupation"),
    aadhaar: get("aadhaar"), abha: get("abha"), address: get("address"),
    email: get("email"), phone: get("phone"), documents: docs
  };
  sessionStorage.setItem("signupRole", "patient");
  sessionStorage.setItem("email", data.email);
  sessionStorage.setItem("applicationData", JSON.stringify(data));
  window.location.href = "create_password.html";
};
</script>
</body>
</html>
