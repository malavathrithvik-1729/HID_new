<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verify OTP - V-Med ID</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Verify your identity with a one-time password to securely access your V-Med ID health account."/>
  <meta name="keywords" content="healthcare, patient records, digital health identity, doctor consultation, AI health, V-Med, vmed-id, medical records India"/>
  <meta name="author" content="V-Med ID"/>
  <meta name="robots" content="index, follow"/>
  <!-- Open Graph -->
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="Verify OTP - V-Med ID"/>
  <meta property="og:description" content="Verify your identity with a one-time password to securely access your V-Med ID health account."/>
  <meta property="og:image" content="https://vmed-id.web.app/assets/og-image.png"/>
  <meta property="og:url" content="https://vmed-id.web.app"/>
  <meta property="og:site_name" content="V-Med ID"/>
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Verify OTP - V-Med ID"/>
  <meta name="twitter:description" content="Verify your identity with a one-time password to securely access your V-Med ID health account."/>
  <meta name="twitter:image" content="https://vmed-id.web.app/assets/og-image.png"/>
  <link rel="stylesheet" href="otp.css" />
</head>
<body>

  <div class="otp-container">

    <img src="../../assets/images/logo.jpg" alt="V-Med ID Logo" class="logo" />

    <h2>OTP Verification</h2>
    <p class="subtitle">
      Enter the 6-digit verification code
    </p>

    <input
      type="text"
      id="otp"
      placeholder="Enter 6-digit OTP"
      maxlength="6"
      inputmode="numeric"
    />

    <button id="verifyBtn">Verify & Continue</button>

    <p id="error" class="error"></p>

  </div>

  <script>
    const verifyBtn = document.getElementById("verifyBtn");
    const otpInput = document.getElementById("otp");
    const error = document.getElementById("error");

    verifyBtn.addEventListener("click", () => {
      const otp = otpInput.value.trim();

      // Dummy OTP check (any 6 digits)
      if (!/^\d{6}$/.test(otp)) {
        error.textContent = "Please enter a valid 6-digit OTP";
        return;
      }

      // ✅ SIGNUP FLOW → Create Password
      const signupRole = sessionStorage.getItem("signupRole");
      if (signupRole) {
        window.location.href = "../signup/create_password.html";
        return;
      }

      // ✅ LOGIN FLOW → Dashboard
      const role = sessionStorage.getItem("role");

      if (role === "patient") {
        window.location.href = "../patient_dashboard/index.html";
      } else if (role === "doctor") {
        window.location.href = "../doctor_dashboard/index.html";
      } else if (role === "government") {
        window.location.href = "../gov_dashboard/index.html";
      } else {
        error.textContent = "Session expired. Please login again.";
      }
    });
  </script>

</body>
</html>
