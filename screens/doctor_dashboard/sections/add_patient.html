<!-- ===============================
     ADD PATIENT
================================ -->
<div class="section-header">
  <h1>➕ Add Patient</h1>
  <p class="muted">Link a patient to your care using their V-Med ID</p>
</div>

<div class="add-patient-card">
  <div class="field-group">
    <label>Patient V-Med ID <span class="required">*</span></label>
    <input type="text" id="patientVmedInput" placeholder="e.g. VMED-p-name-1234" />
  </div>

  <div class="field-group">
    <label>Reason for Visit <span class="required">*</span></label>
    <input type="text" id="visitReason" placeholder="e.g. Routine checkup, Fever, Follow-up" />
  </div>

  <div class="field-group">
    <label>Notes (optional)</label>
    <textarea id="visitNotes" rows="3" placeholder="Any additional clinical notes..."></textarea>
  </div>

  <button class="primary-btn" id="addPatientBtn" onclick="handleAddPatient()">
    🔍 Search & Add Patient
  </button>

  <div id="addPatientMsg" class="add-msg"></div>
</div>

<script type="module">
  import { db } from "../../../../js/firebase.js";
  import {
    collection, query, where, getDocs
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  window.handleAddPatient = async function () {
    const vmedId  = document.getElementById("patientVmedInput").value.trim();
    const reason  = document.getElementById("visitReason").value.trim();
    const msg     = document.getElementById("addPatientMsg");

    if (!vmedId || !reason) {
      msg.textContent = "⚠️ Please fill in V-Med ID and reason for visit.";
      msg.className = "add-msg error";
      return;
    }

    msg.textContent = "Searching...";
    msg.className = "add-msg info";

    try {
      const q = query(collection(db, "users"), where("vmedId", "==", vmedId));
      const snap = await getDocs(q);

      if (snap.empty) {
        msg.textContent = "❌ No patient found with this V-Med ID.";
        msg.className = "add-msg error";
        return;
      }

      const patient = snap.docs[0].data();
      if (patient.role !== "patient") {
        msg.textContent = "❌ This V-Med ID does not belong to a patient.";
        msg.className = "add-msg error";
        return;
      }

      msg.textContent = `✅ Patient found: ${patient.identity?.fullName}. Feature to save visit coming soon.`;
      msg.className = "add-msg success";

    } catch (err) {
      console.error(err);
      msg.textContent = "❌ Error searching. Please try again.";
      msg.className = "add-msg error";
    }
  };
</script>
