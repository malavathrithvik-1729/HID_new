<div class="section-wrap">
  <div class="page-header">
    <h1 class="page-title">Add Patient</h1>
    <p class="page-sub">Link a patient to your profile using their V-Med ID</p>
  </div>

  <div class="card" style="max-width:560px;margin-bottom:20px">
    <div class="card-title">Search by V-Med ID</div>
    <div class="alert info" style="margin-bottom:16px">
      ℹ️ Ask your patient to share their V-Med ID from their Settings page.
    </div>
    <div id="addPatientMsg" style="display:none;margin-bottom:12px"></div>
    <div class="form-group">
      <label>Patient V-Med ID <span class="req">*</span></label>
      <input type="text" id="searchVmedId"
        placeholder="e.g. VMED-p-priya-2847"
        style="font-family:monospace;font-size:15px;letter-spacing:.5px"/>
    </div>
    <button class="btn-primary" id="searchPatientBtn" style="width:100%">Search Patient</button>
  </div>

  <!-- Found patient preview -->
  <div id="foundPatientCard" class="card" style="max-width:560px;display:none">
    <div class="card-title">Patient found</div>
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:16px">
      <div class="patient-detail-avatar" style="background:var(--accent);flex-shrink:0">P</div>
      <div>
        <div style="font-size:18px;font-weight:600;color:var(--ink);margin-bottom:3px" id="foundName">--</div>
        <div style="font-size:13px;color:var(--accent);font-weight:500" id="foundVmed">--</div>
      </div>
    </div>
    <div class="grid-2" style="gap:12px;margin-bottom:20px">
      <div><span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Gender</span>       <div style="font-weight:500;font-size:14px;color:var(--ink);margin-top:3px" id="foundGender">--</div></div>
      <div><span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Date of birth</span><div style="font-weight:500;font-size:14px;color:var(--ink);margin-top:3px" id="foundDob">--</div></div>
      <div><span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Blood group</span>  <div style="font-weight:500;font-size:14px;color:var(--ink);margin-top:3px" id="foundBlood">--</div></div>
    </div>
    <button class="btn-primary" id="addPatientBtn" style="width:100%;padding:12px">
      Confirm &amp; Add Patient
    </button>
  </div>
</div>
