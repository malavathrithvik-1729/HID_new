<div class="section-wrap">
  <div class="page-header">
    <h1 class="page-title">Medical History</h1>
    <p class="page-sub">Your clinical timeline, reports, and doctor-verified documents</p>
  </div>
  
  <div class="card" style="margin-bottom: 24px; padding: 20px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
      <div class="card-title" style="margin-bottom:0; border:none; padding:0;">All Documents</div>
      <div style="display:flex; gap: 8px; align-items: center;">
        <span style="font-size: 12px; color: var(--muted);">Filter:</span>
        <select id="docFilter" style="padding: 8px 12px; font-size: 13px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface);">
          <option value="All">All Types</option>
          <option value="Report">Report</option>
          <option value="Scan">Scan</option>
          <option value="Prescription">Prescription</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    
    <div id="docList" style="display:flex; flex-direction:column; gap:16px;">
       <!-- Document cards rendered by JS -->
       <div class="loader-ring" style="margin: 40px auto;"></div>
    </div>
    
    <div id="docEmpty" class="empty-state" style="display:none;">
      <div class="empty-icon">📂</div>
      <h3>No documents found</h3>
      <p>No documents match your current filter, or none have been added yet.</p>
    </div>
  </div>
</div>
